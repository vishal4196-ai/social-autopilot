{% extends "base.html" %}
{% block title %}Login · Vishal AI{% endblock %}
{% block content %}
<div class="login-shell">
  <div class="login-card">
    <h1 class="brand-xl">VISHAL<span class="dot">.</span>AI</h1>
    <p class="muted">Your content autopilot.</p>

    {% if msg %}
      <div class="banner {% if msg_ok %}ok{% else %}warn{% endif %}">{{ msg }}</div>
    {% endif %}

    <form method="post" action="/login" class="stack">
      <input type="text" name="username" placeholder="Username" required
             autocomplete="username" autocapitalize="off" spellcheck="false">
      <input type="password" name="password" placeholder="Password" required
             autocomplete="current-password">
      <button type="submit" class="btn primary big">Sign in</button>
    </form>
  </div>
</div>
{% endblock %}
